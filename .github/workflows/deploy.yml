name: Deploy to GitHub Pages

on:
  # 推送到 main 分支时触发
  push:
    branches: [main]
  # 允许在 Actions 页面手动触发
  workflow_dispatch:

# 部署到 GitHub Pages 所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同时只允许一个部署，排队但不取消进行中的部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v4
        # withastro/action 会自动检测包管理器、安装依赖、构建并上传产物

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
